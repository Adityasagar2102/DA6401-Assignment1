program: train.py
method: random
metric:
  name: val_accuracy
  goal: maximize
parameters:
  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop", "adam", "nadam"]
  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.1
  num_layers:
    values: [3, 4, 5]
  hidden_size:
    values:
      - "64 64 64"
      - "128 128 128"
      - "256 256 256"
  activation:
    values: ["relu", "sigmoid", "tanh"]
  weight_decay:
    values: [0.0, 0.0005, 0.005]
  batch_size:
    values: [32, 64, 128]
  dataset:
    value: "mnist"
  epochs:
    value: 10
  loss:
    value: "cross_entropy"
  weight_init:
    value: "xavier"
  wandb_project:
    value: "da6401_assignment_1"

command:
  - ${env}
  - python
  - ${program}
  - ${args}
